name: tests

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
    branches: [main, master]

jobs:
  web-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run web tests
        run: |
          set -o pipefail
          npm run test:web 2>&1 | tee web-test.log
      - name: Upload web test log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: web-test-log-${{ github.run_number }}
          path: web-test.log

  smoke-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run smoke test scenario
        run: |
          set -o pipefail
          npm run test:smoke 2>&1 | tee smoke-test.log
      - name: Upload smoke test log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-test-log-${{ github.run_number }}
          path: smoke-test.log

  rust-tests:
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --manifest-path src-tauri/Cargo.toml
